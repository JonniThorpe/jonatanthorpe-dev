# Sitio estatico SPA (build de Vite servido por nginx).
# Punto de partida en :80. certbot --nginx anadira el bloque :443 y la
# redireccion http->https al emitir el certificado; no edites eso a mano,
# deja que certbot lo gestione y refleja despues el resultado en el repo.

server {
    listen 80;
    listen [::]:80;
    server_name jonatanthorpe.dev www.jonatanthorpe.dev;

    root /var/www/jonatanthorpe.dev;
    index index.html;

    # SPA: los deep links caen a index.html en vez de dar 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre: cache larga e inmutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
