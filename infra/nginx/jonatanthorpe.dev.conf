# Sitio estatico SPA (build de Vite servido por nginx).
# Estado final tras `certbot --nginx`: bloque :443 con TLS y redireccion
# http->https gestionados por Certbot. Las lineas "managed by Certbot" las
# reescribe certbot en cada renovacion/reconfiguracion; no las edites a mano.

server {
    server_name jonatanthorpe.dev www.jonatanthorpe.dev;

    root /var/www/jonatanthorpe.dev;
    index index.html;

    # SPA: los deep links caen a index.html en vez de dar 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre: cache larga e inmutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/jonatanthorpe.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/jonatanthorpe.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}


server {
    if ($host = www.jonatanthorpe.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = jonatanthorpe.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name jonatanthorpe.dev www.jonatanthorpe.dev;
    return 404; # managed by Certbot
}
